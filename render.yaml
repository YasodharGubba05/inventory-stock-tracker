databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory
    plan: free

services:
  - type: web
    name: inventory-service
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
