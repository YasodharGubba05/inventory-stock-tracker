services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://inventory:inventory@db:5432/inventory
      PORT: "8000"
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "scripts/start.sh"]

  test:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://inventory:inventory@db:5432/inventory_test
      LOG_LEVEL: WARNING
      LOG_JSON: "false"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test
    command: >
      sh -c "alembic upgrade head &&
             pytest -v"

volumes:
  postgres_data:
